apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:worker-latest
        env:
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq:5672"