name: CI/CD Pipeline

on:
  push:
    branches: [main]
      - 'backend/**'
      - 'frontend/**'
      - 'notification-microservice/**'
      - '.github/workflows/ci-cd.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Run Tests
        env:
          MONGO_URI: mongodb://localhost:27017/testdb
        run: |
          cd backend
          pip install -r requirements.txt
          nosetests
          
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:backend-${{ steps.vars.outputs.sha_short }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:backend-${{ steps.vars.outputs.sha_short }}
          
      - name: Build and Push Worker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:worker-${{ steps.vars.outputs.sha_short }} ./notification-microservice
          docker push ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:worker-${{ steps.vars.outputs.sha_short }}

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:frontend-${{ steps.vars.outputs.sha_short }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/my-portfolio-app:frontend-${{ steps.vars.outputs.sha_short }}
  

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update Kubernetes Manifests with new Image Tags
        run: |
          sed -i "s|image: floriankamaj/my-portfolio-app:frontend-.*|image: floriankamaj/my-portfolio-app:frontend-${{ steps.vars.outputs.sha_short }}|g" k8s/frontend-deployment.yaml
          sed -i "s|image: floriankamaj/my-portfolio-app:backend-.*|image: floriankamaj/my-portfolio-app:backend-${{ steps.vars.outputs.sha_short }}|g" k8s/backend-deployment.yaml
          sed -i "s|image: floriankamaj/my-portfolio-app:worker-.*|image: floriankamaj/my-portfolio-app:worker-${{ steps.vars.outputs.sha_short }}|g" k8s/notification-worker-deployment.yaml

      - name: Commit and Push changes back to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
        
          git add k8s/
          
          git commit -m "Update image tags to ${{ steps.vars.outputs.sha_short }} [skip ci]" || echo "No changes to commit"
          
          git push origin main